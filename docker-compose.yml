version: "3.8"
services:
  app:
    build: .
    container_name: myapp
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
